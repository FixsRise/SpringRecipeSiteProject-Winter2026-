<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipes</title>
    <link th:href="@{/styles/main.css}" rel="stylesheet"/>
</head>
<body>

<h1 class="page-title">🍽 Recipes Book</h1>

<div class="new-recipe-container">
    <a class="new-recipe-button" th:href="@{/recipes/new}">➕ Add Recipe</a>
</div>

<div class="recipes-container">
    <div th:each="recipe : ${recipeList}" class="recipe-card">

        <div class="card-actions">
            <a class="edit-btn" th:href="@{/recipes/{id}/edit(id=${recipe.id})}">Edit</a>
            <a class="delete-btn" th:href="@{/recipes/{id}/delete(id=${recipe.id})}">Delete</a>
        </div>

        <a class="recipe-link" th:href="@{/recipes/{id}(id=${recipe.id})}">
            <img class="recipe-image"
                 th:src="${recipe.imageUrl}"
                 alt="Recipe image"/>

            <div class="recipe-content">
                <h2 th:text="${recipe.title}"></h2>
                <p class="description" th:text="${recipe.description}"></p>
                <p class="time">
                    ⏱ Cooking time:
                    <span th:text="${recipe.cookingTime}"></span> min
                </p>
            </div>
        </a>
    </div>
</div>

</body>
</html>
