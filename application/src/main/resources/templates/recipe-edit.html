<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Recipe</title>
    <link th:href="@{/styles/recipe-edit.css}" rel="stylesheet"/>
</head>
<body>

<h1 class="page-title">✏️ Edit Recipe</h1>

<div class="form-container">
    <form th:action="@{/recipes/{id}(id=${recipe.id})}" method="post"
          class="recipe-form" enctype="multipart/form-data">

        <label for="title">Title</label>
        <input type="text" id="title" name="title" th:value="${recipe.title}" required/>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" th:text="${recipe.description}"></textarea>

        <label for="image">Recipe Image</label>
        <input type="file" id="image" name="image" accept="image/*"/>

        <div>
            <p>Current Image:</p>
            <img th:src="${recipe.imageUrl}" alt="Recipe Image" style="max-width:200px; margin-top:5px;"/>
        </div>

        <label for="cookingTime">Cooking Time (minutes)</label>
        <input type="number" id="cookingTime" name="cookingTime" th:value="${recipe.cookingTime}" required/>

        <label for="ingredientsText">Ingredients (one per line)</label>
        <textarea id="ingredientsText" name="ingredientsText" rows="6" th:text="${ingredientsText}"></textarea>

        <label for="stepsText">Steps (one per line)</label>
        <textarea id="stepsText" name="stepsText" rows="8" th:text="${stepsText}"></textarea>

        <div class="form-buttons">
            <button type="submit" class="submit-btn">Update Recipe</button>
            <a href="/" class="back-button">← Back to recipes</a>
        </div>
    </form>
</div>

</body>
</html>
